<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bibliotech</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div class="topo">
            <div>
                <h1>BiblioTech</h1>
                <p>Sistema Gerenciador da Biblioteca</p>

            </div>
            <!--area admin-->
           
            <nav id="area-admin">
            <button onclick="mostrarSecao('livros')"> 📚 Livros </button> 
            <button onclick="mostrarSecao('clientes')"> 👥 Cadastro de Clientes </button> 
            <button onclick="mostrarSecao('emprestimos')"> 📦 Empréstimos Ativos </button> 
        </nav>
        <!--area cliente-->
        <nav id="area-cliente">
                
            <button onclick="mostrarSecao('livros')">📚 Buscar Livros</button>
            <button onclick="mostrarSecao('emprestimos')">📦 Meus Empréstimos</button>
        </nav>
    </div>
        
       </nav>
        </div>
    </header>

    <div id="boas-vindas">
        <h2>Seja bem-vindo!</h2>
        <p>Escolha uma das opções acima para começar.</p>
    </div>

    <main>
        <section class="card secao" id="clientes">
            <h2>Cadastro cliente</h2>
            <form action="#" id="cadastro-cliente">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" placeholder="Nome completo">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Email">
                <label for="cpf">CPF:</label>
                <input type="text" id="cpf" name="cpf" placeholder="___.___.___-__">
                <button type="submit" id="botao-cadastrar">Cadastrar</button>
            </form>
            <br><br>
            <h2>Clientes já cadastrados</h2>
            <div id="listaClientes">
                <!--lista aq-->
            </div>

        </section>


        <section class="card secao" id="livros">
            <h2>Busca de livros</h2>
            <div class="busca">
                <input type="text" id="busca-livro" name="titulo" placeholder="Título do livro">

                <button type="button" id="botao-buscar">Buscar</button>

            </div>

            <p id="loading"></p>

            <div id="listaLivros">
                <!-- Lista aq-->
            </div>
        </section>

    </main>

    <section class="card secao" id="emprestimos">
        <div id="listaEmprestimos">
            <h2>Empréstimos Ativos</h2>
            <!-- Lista aq-->
        </div>
    </section>
</div>


    <script src="script.js"></script>
</body>

</html>
